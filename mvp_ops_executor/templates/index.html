<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ops Executor MVP</title>
  <style>
    :root {
      --bg: #f5f2ea;
      --ink: #1f221b;
      --muted: #616557;
      --panel: rgba(255,255,255,0.85);
      --line: #d9d4c4;
      --accent: #0f7a52;
      --accent-ink: #ffffff;
      --user: #e0f3ea;
      --bot: #fff8e1;
      --shadow: 0 14px 40px rgba(0,0,0,0.08);
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(900px 500px at 10% -10%, rgba(15,122,82,0.18), transparent 60%),
        radial-gradient(700px 500px at 100% 0%, rgba(196,138,47,0.14), transparent 60%),
        var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .shell {
      width: min(920px, 100%);
      background: var(--panel);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(to right, rgba(255,255,255,0.95), rgba(255,255,255,0.65));
    }
    h1 {
      margin: 0;
      font-size: 1.15rem;
      letter-spacing: 0.02em;
    }
    .sub {
      font-size: 0.9rem;
      color: var(--muted);
    }
    .links {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .links a {
      text-decoration: none;
      color: var(--accent);
      border: 1px solid rgba(15,122,82,0.24);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.85rem;
      background: rgba(15,122,82,0.05);
    }
    .body {
      display: grid;
      grid-template-columns: 1.1fr 2fr;
      gap: 0;
    }
    .sidebar {
      border-right: 1px solid var(--line);
      padding: 16px;
      background: rgba(255,255,255,0.45);
    }
    .sidebar h2 {
      margin: 0 0 8px;
      font-size: 0.95rem;
    }
    .sidebar p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.35;
    }
    .example {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      margin: 0 0 8px;
      background: #fff;
      cursor: pointer;
      font-family: inherit;
      color: var(--ink);
    }
    .example:hover { border-color: #bcb69f; }
    .main {
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 560px;
    }
    .thread {
      padding: 16px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background:
        linear-gradient(rgba(255,255,255,0.65), rgba(255,255,255,0.65)),
        repeating-linear-gradient(
          0deg,
          transparent 0 29px,
          rgba(0,0,0,0.02) 29px 30px
        );
    }
    .msg {
      padding: 10px 12px;
      border-radius: 12px;
      max-width: 90%;
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: 0 1px 0 rgba(255,255,255,0.7) inset;
    }
    .msg.user { background: var(--user); align-self: flex-end; }
    .msg.bot { background: var(--bot); align-self: flex-start; }
    .meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
    }
    form {
      border-top: 1px solid var(--line);
      padding: 14px;
      background: #fbfaf6;
      display: grid;
      gap: 10px;
    }
    .row {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 10px;
      align-items: center;
    }
    label {
      font-size: 0.85rem;
      color: var(--muted);
    }
    input, textarea, button {
      font: inherit;
    }
    input, textarea {
      width: 100%;
      border: 1px solid #cfc8b5;
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
      color: var(--ink);
    }
    textarea {
      resize: vertical;
      min-height: 76px;
    }
    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .hint {
      color: var(--muted);
      font-size: 0.82rem;
    }
    .send {
      border: none;
      background: linear-gradient(135deg, #0f7a52, #125a68);
      color: var(--accent-ink);
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 8px 18px rgba(15,122,82,0.18);
    }
    .send:disabled { opacity: 0.6; cursor: wait; }
    @media (max-width: 800px) {
      .body { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--line); }
      .main { min-height: 65vh; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <h1>Ops Executor MVP</h1>
        <div class="sub">Deterministic parse, confirm, execute, audit</div>
      </div>
      <div class="links">
        <a href="/logs">Logs</a>
        <a href="/health" target="_blank" rel="noreferrer">Health</a>
      </div>
    </header>
    <div class="body">
      <aside class="sidebar">
        <h2>Demo Flow</h2>
        <p>Type a telecom request. The backend parses it, validates fields, asks for confirmation, then executes through a connector wrapper.</p>
        <button class="example" type="button" data-example="Suspend SIM 8944123412341234567 immediately due to non payment">
          Suspend SIM 8944... due to non payment
        </button>
        <button class="example" type="button" data-example="Change rate plan for ICCID 8944123412341234567 to RP_BASIC effective 2026-03-01">
          Change rate plan for ICCID 8944... to RP_BASIC
        </button>
        <button class="example" type="button" data-example="yes">
          yes
        </button>
      </aside>
      <section class="main">
        <div id="thread" class="thread" aria-live="polite"></div>
        <form id="chatForm">
          <div class="row">
            <label for="userInput">User</label>
            <input id="userInput" name="user" value="demo-user" />
          </div>
          <div class="row">
            <label for="messageInput">Message</label>
            <textarea id="messageInput" name="message" placeholder="Suspend SIM 8944xxxx immediately due to non payment"></textarea>
          </div>
          <div class="actions">
            <div class="hint">Replies include a request_id for audit lookup at <code>/logs</code>.</div>
            <button id="sendBtn" class="send" type="submit">Send</button>
          </div>
        </form>
      </section>
    </div>
  </div>

  <script>
    const thread = document.getElementById('thread');
    const form = document.getElementById('chatForm');
    const userInput = document.getElementById('userInput');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    function appendMessage(role, text, meta = '') {
      const bubble = document.createElement('div');
      bubble.className = `msg ${role}`;
      bubble.innerHTML = `<div>${escapeHtml(text)}</div>${meta ? `<div class="meta">${escapeHtml(meta)}</div>` : ''}`;
      thread.appendChild(bubble);
      thread.scrollTop = thread.scrollHeight;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }

    async function sendMessage(message) {
      const user = userInput.value.trim() || 'demo-user';
      appendMessage('user', message, `user=${user}`);
      sendBtn.disabled = true;
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user, message })
        });
        const data = await res.json();
        if (!res.ok) {
          appendMessage('bot', `HTTP ${res.status}: ${JSON.stringify(data)}`);
          return;
        }
        const meta = [data.status, data.request_id].filter(Boolean).join(' | ');
        appendMessage('bot', data.reply || JSON.stringify(data), meta);
      } catch (err) {
        appendMessage('bot', `Network error: ${err}`);
      } finally {
        sendBtn.disabled = false;
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const message = messageInput.value.trim();
      if (!message) return;
      messageInput.value = '';
      await sendMessage(message);
      messageInput.focus();
    });

    document.querySelectorAll('.example').forEach((button) => {
      button.addEventListener('click', () => {
        messageInput.value = button.dataset.example || '';
        messageInput.focus();
      });
    });

    appendMessage('bot', 'Type a request to begin. Example: "Suspend SIM 8944123412341234567 immediately due to non payment".');
  </script>
</body>
</html>
